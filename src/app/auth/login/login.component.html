<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="logo">Plateforme de surveillance environnementale</h1>
    </div>

    <div class="login-body">
      <h2>Connexion</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="Votre email"
            class="form-control"
            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          >
          <div class="invalid-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email est requis</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Email invalide</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Votre mot de passe"
            class="form-control"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Mot de passe est requis</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Minimum 6 caractères</span>
          </div>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button
          type="submit"
          class="btn-login"
          [disabled]="loginForm.invalid || isLoading"
        >
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading">Connexion...</span>
        </button>

        <div class="login-footer">
          <p>Comptes de test:</p>
          <p><strong>Admin:</strong> admin@ecosurveillance.com / admin123</p>
          <p><strong>Étudiant:</strong> etudiant@ecosurveillance.com / etudiant123</p>
        </div>
      </form>
    </div>
  </div>
</div>
