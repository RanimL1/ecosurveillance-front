<div class="dashboard-container">
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo.png" alt="Logo" class="sidebar-logo">
      <div class="brand-text">
        <span class="brand-eco">ECO</span>
        <span class="brand-sub">SURVEILLANCE</span>
      </div>
    </div>

    <nav class="menu">
      <a routerLink="/user/my-infractions" routerLinkActive="active" class="menu-item">
        <i class="fas fa-list-ul"></i> Mes infractions
      </a>
      <a routerLink="/user/history" routerLinkActive="active" class="menu-item">
        <i class="fas fa-history"></i> Historiques
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile-container">
        <div class="user-profile">
          <img src="assets/user.png" alt="User" class="avatar-img">
          <div class="user-text">
            <p class="user-name">Foulen Ben Foulen</p>
            <p class="user-role">Etudiant</p>
          </div>
        </div>
        <button class="logout-btn" (click)="onLogout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Déconnexion</span>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <h2>Mes infractions</h2>
      <div class="user-profile">
        <img src="assets/user.png" alt="User" class="avatar-img">
        <div class="user-text">
          <p class="user-name">Foulen Ben Foulen</p>
          <p class="user-role">Etudiant</p>
        </div>
      </div>
    </header>

    <section class="content-area">
      <div class="table-card">
        <table class="infractions-table">
          <thead>
          <tr>
            <th>Infraction</th>
            <th>Preuve</th>
            <th>Date</th>
            <th>Punition</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let infraction of infractions">
            <td>{{ infraction.description }}</td>
            <td>
              <button class="btn-view" (click)="openProofs(infraction.id)">
                Voir preuve
              </button>
            </td>
            <td>{{ infraction.date | date:'dd/MM/yy' }}</td>
            <td><strong>{{ infraction.punition }}</strong></td>
            <td>
                <span class="status-badge"
                      [ngClass]="{
                        'completed': infraction.status === 'Terminé',
                        'waiting': infraction.status === 'En attente',
                        'processing': infraction.status === 'En cours'
                      }">
                  {{ infraction.status }}
                </span>
            </td>
            <td>
              <button
                class="btn-action"
                [class.disabled-btn]="infraction.status !== 'En attente'"
                [disabled]="infraction.status !== 'En attente'"
                (click)="valider(infraction)">
                Valider
              </button>
              <span *ngIf="infraction.status !== 'En attente'"></span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<app-proof-viewer
  *ngIf="showModal"
  [infractionId]="selectedInfractionId!"
  (closeEvent)="closeModal()">
</app-proof-viewer>
