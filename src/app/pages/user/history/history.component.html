<div class="dashboard-container">
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo.png" alt="Logo" class="sidebar-logo">
      <div class="brand-text">
        <span class="brand-eco">ECO</span>
        <span class="brand-sub">SURVEILLANCE</span>
      </div>
    </div>

    <nav class="menu">
      <a routerLink="/user/my-infractions" class="menu-item">
        <i class="fas fa-list-ul"></i> Mes infractions
      </a>
      <a routerLink="/user/history" class="menu-item active">
        <i class="fas fa-history"></i> Historiques
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <img src="assets/user.png" alt="User" class="avatar-img">
        <div class="user-text">
          <p class="user-name">Foulen Ben Foulen</p>
          <p class="user-role">Etudiant</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <h2>Historiques</h2>
      <div class="user-profile">
        <img src="assets/user.png" alt="User" class="avatar-img">
        <div class="user-text">
          <p class="user-name">Foulen Ben Foulen</p>
          <p class="user-role">Etudiant</p>
        </div>
      </div>
    </header>

    <section class="content-area">
      <div class="table-card">
        <table class="history-table">
          <thead>
          <tr>
            <th>Infraction</th>
            <th>Preuve</th>
            <th>Date</th>
            <th>Punition</th>
            <th>Status</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let infraction of infractions">
            <td>{{ infraction.description || '-' }}</td>
            <td>
              <button class="btn-preuve" (click)="openProofs(infraction.id)">
                Voir preuve
              </button>
            </td>
            <td>{{ infraction.date | date:'dd/MM/yy' }}</td>
            <td>{{ infraction.punition || '-' }}</td>
            <td><span class="status-badge completed">Terminé</span></td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<app-proof-viewer
  *ngIf="showModal"
  [infractionId]="selectedInfractionId!"
  (closeEvent)="showModal = false">
</app-proof-viewer>
