<nav class="navbar">
  <div class="nav-brand">
    <span class="logo">🌿</span>
    <span class="brand-name">EcoSurveillance</span>
  </div>

  <!-- ADMIN NAVIGATION -->
  <div class="nav-links" *ngIf="authService.isAdmin()">
    <a routerLink="/admin/dashboard" [class.active]="isActive('/admin/dashboard')">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <a routerLink="/admin/infractions" [class.active]="isActive('/admin/infractions')">
      <span class="nav-icon">📋</span> Infractions
    </a>
    <a routerLink="/admin/etudiants" [class.active]="isActive('/admin/etudiants')">
      <span class="nav-icon">👥</span> Étudiants
    </a>
    <a routerLink="/admin/cameras" [class.active]="isActive('/admin/cameras')">
      <span class="nav-icon">📹</span> Caméras
    </a>
  </div>

  <!-- ETUDIANT NAVIGATION -->
  <div class="nav-links" *ngIf="authService.isEtudiant()">
    <a routerLink="/etudiant/dashboard" [class.active]="isActive('/etudiant/dashboard')">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <a routerLink="/etudiant/infractions" [class.active]="isActive('/etudiant/infractions')">
      <span class="nav-icon">📋</span> Mes Infractions
    </a>
  </div>

  <div class="nav-user">
    <span class="user-info">
      <span class="user-role">{{ currentUser?.role }}</span>
      <span class="user-name">{{ currentUser?.nom }}</span>
    </span>
    <button class="btn-logout" (click)="logout()">
      <span>🚪</span> Déconnexion
    </button>
  </div>
</nav>
