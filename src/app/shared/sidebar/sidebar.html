<div class="sidebar" [class.collapsed]="isCollapsed">
  <button class="toggle-btn" (click)="toggleSidebar()">
    <span *ngIf="!isCollapsed">◀</span>
    <span *ngIf="isCollapsed">▶</span>
  </button>

  <div class="sidebar-header">
    <span class="logo">🌿</span>
    <h3 *ngIf="!isCollapsed">EcoSurveillance</h3>
  </div>

  <!-- ADMIN MENU -->
  <nav class="sidebar-nav" *ngIf="authService.isAdmin()">
    <a routerLink="/admin/dashboard" [class.active]="isActive('/admin/dashboard')" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-text" *ngIf="!isCollapsed">Dashboard</span>
    </a>
    <a routerLink="/admin/infractions" [class.active]="isActive('/admin/infractions')" class="nav-item">
      <span class="nav-icon">📋</span>
      <span class="nav-text" *ngIf="!isCollapsed">Infractions</span>
    </a>
    <a routerLink="/admin/etudiants" [class.active]="isActive('/admin/etudiants')" class="nav-item">
      <span class="nav-icon">👥</span>
      <span class="nav-text" *ngIf="!isCollapsed">Étudiants</span>
    </a>
    <a routerLink="/admin/cameras" [class.active]="isActive('/admin/cameras')" class="nav-item">
      <span class="nav-icon">📹</span>
      <span class="nav-text" *ngIf="!isCollapsed">Caméras</span>
    </a>
  </nav>

  <!-- ETUDIANT MENU -->
  <nav class="sidebar-nav" *ngIf="authService.isEtudiant()">
    <a routerLink="/etudiant/dashboard" [class.active]="isActive('/etudiant/dashboard')" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-text" *ngIf="!isCollapsed">Dashboard</span>
    </a>
    <a routerLink="/etudiant/infractions" [class.active]="isActive('/etudiant/infractions')" class="nav-item">
      <span class="nav-icon">📋</span>
      <span class="nav-text" *ngIf="!isCollapsed">Mes Infractions</span>
    </a>
  </nav>
</div>
